name: Build and package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      COMMONLIB_COMMIT: b93280e832f263dbef44e44cbe2936622a02f91a

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve vcpkg
        shell: pwsh
        run: |
          $root = $env:VCPKG_ROOT
          if (-not $root) { $root = $env:VCPKG_INSTALLATION_ROOT }
          if (-not $root) { $root = "C:\vcpkg" }
          $toolchain = Join-Path $root "scripts/buildsystems/vcpkg.cmake"
          if (-not (Test-Path $toolchain)) {
            throw "Could not locate vcpkg toolchain at $toolchain"
          }
          "VCPKG_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Select CMake generator
        shell: pwsh
        run: |
          # windows-latest (windows-2025 image) ships Visual Studio 2026 only;
          # older images ship Visual Studio 2022. Detect what is installed and
          # what this CMake supports instead of hardcoding a generator.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsVersion = ""
          if (Test-Path $vswhere) {
            $vsVersion = (& $vswhere -latest -products * -property installationVersion)
          }
          $help = (& cmake --help | Out-String)
          $generator = $null
          if ($vsVersion -like "18.*" -and $help -match "Visual Studio 18 2026") {
            $generator = "Visual Studio 18 2026"
          } elseif ($vsVersion -like "17.*" -and $help -match "Visual Studio 17 2022") {
            $generator = "Visual Studio 17 2022"
          } elseif ($help -match "Visual Studio 18 2026") {
            $generator = "Visual Studio 18 2026"
          } elseif ($help -match "Visual Studio 17 2022") {
            $generator = "Visual Studio 17 2022"
          }
          if (-not $generator) {
            throw "No supported Visual Studio CMake generator found (installed VS: $vsVersion)."
          }
          Write-Host "Using CMake generator: $generator (installed VS: $vsVersion)"
          "CMAKE_GENERATOR_NAME=$generator" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate generated assets
        shell: pwsh
        run: |
          python generate_esp.py
          git diff --exit-code -- package/Data/NPCPathingNG.esp package/Data/Seq/NPCPathingNG.seq
          python -m unittest discover -s tests -v

      - name: Fetch pinned CommonLibSSE-NG
        shell: pwsh
        run: |
          git clone --filter=blob:none https://github.com/CharmedBaryon/CommonLibSSE-NG.git extern/CommonLibSSE
          git -C extern/CommonLibSSE checkout $env:COMMONLIB_COMMIT

      - name: Build and install CommonLibSSE-NG
        shell: pwsh
        run: |
          cmake -S extern/CommonLibSSE -B extern/CommonLibSSE/build `
            -G "$env:CMAKE_GENERATOR_NAME" -A x64 `
            -DBUILD_TESTS=OFF `
            -DENABLE_SKYRIM_VR=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DCMAKE_INSTALL_PREFIX="$PWD/extern/CommonLibSSE/install" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DVCPKG_HOST_TRIPLET=x64-windows-static
          cmake --build extern/CommonLibSSE/build --config Release --target install --parallel 2

          # The generated CommonLibSSEConfig.cmake includes CommonLibSSE.cmake
          # unconditionally, but this pinned commit does not always install that
          # helper module. Supply it from the source tree when it is absent,
          # then fail loudly rather than letting the plugin configure step die
          # with a confusing "include could not find requested file".
          $dst = Join-Path $PWD "extern/CommonLibSSE/install/lib/cmake/CommonLibSSE"
          $helper = Join-Path $PWD "extern/CommonLibSSE/cmake/CommonLibSSE.cmake"
          if ((Test-Path $helper) -and -not (Test-Path (Join-Path $dst "CommonLibSSE.cmake"))) {
            Write-Host "Installing missing helper module CommonLibSSE.cmake"
            Copy-Item $helper (Join-Path $dst "CommonLibSSE.cmake")
          }
          Write-Host "CommonLibSSE install contents:"
          Get-ChildItem $dst -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          foreach ($f in @("CommonLibSSEConfig.cmake", "CommonLibSSE-targets.cmake", "CommonLibSSE.cmake")) {
            if (-not (Test-Path (Join-Path $dst $f))) {
              throw "CommonLibSSE install incomplete: missing $f"
            }
          }

      - name: Build NPC Pathing NG
        shell: pwsh
        run: |
          cmake -S . -B build -G "$env:CMAKE_GENERATOR_NAME" -A x64
          cmake --build build --config Release --parallel 2

      - name: Verify the plugin actually built
        shell: pwsh
        run: |
          $dll = "package/Data/SKSE/Plugins/NPCPathingNG.dll"
          if (-not (Test-Path $dll)) { throw "build produced no DLL at $dll" }
          $version = (Select-String -Path src/version.h -Pattern 'String\s*=\s*"([0-9.]+)"').Matches[0].Groups[1].Value
          $bytes = [System.IO.File]::ReadAllBytes((Resolve-Path $dll))
          $text = [System.Text.Encoding]::ASCII.GetString($bytes)
          if (-not $text.Contains($version)) { throw "DLL does not embed version $version" }
          Write-Host "Built NPCPathingNG.dll embedding version $version"
          "MOD_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build release archives
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v
          python tools/package_release.py
          python tools/package_fomod.py

      # Version is read from src/version.h so this never needs editing per release.
      - name: Upload Nexus-ready release
        uses: actions/upload-artifact@v4
        with:
          name: NPC-Pathing-NG-${{ env.MOD_VERSION }}-Nexus
          path: |
            dist/*.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error
          compression-level: 0
