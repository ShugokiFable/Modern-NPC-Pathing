name: Build and package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      COMMONLIB_COMMIT: b93280e832f263dbef44e44cbe2936622a02f91a

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve vcpkg
        shell: pwsh
        run: |
          $root = $env:VCPKG_ROOT
          if (-not $root) { $root = $env:VCPKG_INSTALLATION_ROOT }
          if (-not $root) { $root = "C:\vcpkg" }
          $toolchain = Join-Path $root "scripts/buildsystems/vcpkg.cmake"
          if (-not (Test-Path $toolchain)) {
            throw "Could not locate vcpkg toolchain at $toolchain"
          }
          "VCPKG_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Validate generated assets
        shell: pwsh
        run: |
          python generate_esp.py
          git diff --exit-code -- package/Data/NPCPathingNG.esp package/Data/Seq/NPCPathingNG.seq
          python -m unittest discover -s tests -v

      - name: Fetch pinned CommonLibSSE-NG
        shell: pwsh
        run: |
          git clone --filter=blob:none https://github.com/CharmedBaryon/CommonLibSSE-NG.git extern/CommonLibSSE
          git -C extern/CommonLibSSE checkout $env:COMMONLIB_COMMIT

      - name: Build and install CommonLibSSE-NG
        shell: pwsh
        run: |
          cmake -S extern/CommonLibSSE -B extern/CommonLibSSE/build `
            -G "Visual Studio 17 2022" -A x64 `
            -DBUILD_TESTS=OFF `
            -DENABLE_SKYRIM_VR=OFF `
            -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded `
            -DCMAKE_INSTALL_PREFIX="$PWD/extern/CommonLibSSE/install" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static `
            -DVCPKG_HOST_TRIPLET=x64-windows-static
          cmake --build extern/CommonLibSSE/build --config Release --target install --parallel 2

      - name: Build NPC Pathing NG
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64
          cmake --build build --config Release --parallel 2

      - name: Build Nexus archive
        shell: pwsh
        run: |
          python -m unittest discover -s tests -v
          python tools/package_release.py

      - name: Upload Nexus-ready release
        uses: actions/upload-artifact@v4
        with:
          name: NPC-Pathing-NG-2.4.1-Nexus
          path: |
            dist/NPC Pathing NG 2.4.1.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error
          compression-level: 0
