; NPC Pathing NG — fallback settings.
; If NPCPathingNG.esp is enabled and you have MCM Helper, use the in-game
; MCM instead — MCM values override this file and apply instantly.
; This file is re-read every time you close the journal menu.

[General]
bEnabled=1
; Seconds between position samples per NPC
fCheckInterval=0.25
; Consecutive stuck samples before acting (interval * threshold = reaction time)
iStuckThreshold=4
; Moved less than this many units per sample while trying to move = stuck
fStuckDistance=4.0
; Seconds before the same NPC can be unstuck again
fCooldown=3.0
; NPCs scanned per frame (round-robin)
iActorsPerFrame=10

[Parkour]
; Vault/climb via SkyParkour behavior patches (needs SkyParkour V3 + Nemesis/Pandora)
bEnableParkour=1
; Indoors: 0 = no parkour (default), 1 = steps and vaults only, 2 = everything
iIndoorMode=0
; Max climb height in game units. 130 (default) = steps, vaults and low/chest ledges only;
; NPCs won't scale walls, houses or mountainsides. Raise toward 250 (SkyParkour's own max)
; for full cliff/mountain climbing.
fMaxClimbHeight=130.0
; NPCs use EVG Animated Traversal markers (ladders, squeezes, ledges...) if installed
bEnableEVGTraversal=1

[Followers]
; Followers reproduce the player's parkour moves to keep up (Nether's FF compatible)
bFollowerReplay=1

[Avoidance]
; Teleport-around-obstacle fallback, used only as a LAST resort when animated traversal
; can't help. Set 0 to disable teleporting entirely.
bEnableTeleportFallback=1
; How far sideways the bypass teleport goes
fSnapDistance=100.0
; How many times an NPC must trigger stuck (with no parkour/EVG escape) before a teleport
; is allowed. Higher = teleport is rarer and more of a true last resort.
iTeleportEscalation=3

[Filters]
; 0 = NPCs in combat ARE processed (guards/foes climb after you)
bExcludeInCombat=0
; 0 = followers ARE processed
bExcludeFollowers=0
bExcludeMounted=1

[Debug]
; Log every unstuck event to NPCPathingNG.log
bDebugLogging=0
